###############################################################################
# deploy.yml — Continuous Deployment
#
# Triggered on push to main (or manual dispatch).
# 1. Builds Docker images and pushes to ECR.
# 2. Optionally runs Terraform apply for infrastructure changes.
# 3. Runs Ansible playbooks to configure instances and deploy.
# 4. Smoke-tests health endpoints.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION
#   EC2_SSH_KEY           — PEM private key for SSH
#   APP_INSTANCE_IP       — Public IP of the app EC2 instance
#   APP_PRIVATE_IP        — Private IP of the app EC2 instance
#   OBS_INSTANCE_IP       — Public IP of the observability EC2 instance
#   OBS_PRIVATE_IP        — Private IP of the observability EC2 instance
#   ECR_BACKEND_REPO / ECR_FRONTEND_REPO — Full ECR URI
###############################################################################
name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: "Also run terraform apply?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      ansible_tags:
        description: "Ansible tags to limit deployment (blank = all)"
        required: false
        type: string
      ansible_limit:
        description: "Ansible limit (app, observability, or blank for all)"
        required: false
        type: string

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  #  1. Build & push Docker images to ECR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.image }}
      frontend_image: ${{ steps.meta-frontend.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute backend image URI
        id: meta-backend
        run: |
          IMAGE="${{ secrets.ECR_BACKEND_REPO }}:${{ env.IMAGE_TAG }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-backend.outputs.image }}
            ${{ secrets.ECR_BACKEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute frontend image URI
        id: meta-frontend
        run: |
          IMAGE="${{ secrets.ECR_FRONTEND_REPO }}:${{ env.IMAGE_TAG }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-frontend.outputs.image }}
            ${{ secrets.ECR_FRONTEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  #  2. (Optional) Terraform apply
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event.inputs.deploy_infra == 'true' }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init & Apply
        run: |
          terraform init -input=false
          terraform plan -input=false -out=tfplan
          terraform apply -input=false tfplan

  # ---------------------------------------------------------------------------
  #  3. Deploy with Ansible
  # ---------------------------------------------------------------------------
  ansible-deploy:
    name: Ansible Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always() && needs.build-and-push.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

      - name: Generate Ansible inventory
        run: |
          cat > ansible/inventory/hosts.ini << EOF
          [app]
          app-01 ansible_host=${{ secrets.APP_INSTANCE_IP }} private_ip=${{ secrets.APP_PRIVATE_IP }}

          [observability]
          obs-01 ansible_host=${{ secrets.OBS_INSTANCE_IP }} private_ip=${{ secrets.OBS_PRIVATE_IP }}

          [all:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=~/.ssh/deploy_key.pem
          ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          app_private_ip=${{ secrets.APP_PRIVATE_IP }}
          observability_private_ip=${{ secrets.OBS_PRIVATE_IP }}

          # ECR image overrides for production
          app_backend_image=${{ needs.build-and-push.outputs.backend_image }}
          app_frontend_image=${{ needs.build-and-push.outputs.frontend_image }}
          EOF

      - name: Wait for instances
        run: |
          for HOST in "${{ secrets.APP_INSTANCE_IP }}" "${{ secrets.OBS_INSTANCE_IP }}"; do
            echo "Waiting for $HOST..."
            for i in $(seq 1 30); do
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                     -o BatchMode=yes -i ~/.ssh/deploy_key.pem \
                     ubuntu@"$HOST" "echo ready" &>/dev/null; then
                echo "$HOST is reachable."
                break
              fi
              sleep 10
            done
          done

      - name: Run Ansible playbook
        working-directory: ansible
        run: |
          ANSIBLE_CMD="ansible-playbook -i inventory/hosts.ini site.yml"

          TAGS="${{ github.event.inputs.ansible_tags }}"
          LIMIT="${{ github.event.inputs.ansible_limit }}"

          if [[ -n "$TAGS" ]]; then
            ANSIBLE_CMD="$ANSIBLE_CMD --tags $TAGS"
          fi

          if [[ -n "$LIMIT" ]]; then
            ANSIBLE_CMD="$ANSIBLE_CMD --limit $LIMIT"
          fi

          echo "Running: $ANSIBLE_CMD"
          $ANSIBLE_CMD

  # ---------------------------------------------------------------------------
  #  4. Smoke-test health endpoints
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: ansible-deploy
    if: always() && needs.ansible-deploy.result == 'success'

    steps:
      - name: Wait for services to stabilise
        run: sleep 20

      - name: Check health endpoints
        env:
          APP_IP: ${{ secrets.APP_INSTANCE_IP }}
          OBS_IP: ${{ secrets.OBS_INSTANCE_IP }}
        run: |
          FAILED=0
          check() {
            local url="$1" name="$2"
            if curl -sf --max-time 15 "$url" > /dev/null; then
              echo "✓ $name"
            else
              echo "✗ $name — not ready"
              FAILED=$((FAILED + 1))
            fi
          }

          check "http://$APP_IP:3000/health"      "Frontend"
          check "http://$APP_IP:3001/health"       "Backend"
          check "http://$APP_IP:9100/metrics"      "Node Exporter (app)"
          check "http://$APP_IP:9121/metrics"      "Redis Exporter"
          check "http://$OBS_IP:9090/-/healthy"    "Prometheus"
          check "http://$OBS_IP:3000/api/health"   "Grafana"
          check "http://$OBS_IP:16686/"            "Jaeger"
          check "http://$OBS_IP:9100/metrics"      "Node Exporter (obs)"

          if [[ $FAILED -gt 0 ]]; then
            echo "WARNING: $FAILED service(s) not yet healthy"
          fi
