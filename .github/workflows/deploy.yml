###############################################################################
# deploy.yml — Continuous Deployment
#
# Workflow:
# 1. terraform init + apply (idempotent — creates/updates infrastructure)
# 2. Build Docker images and push to ECR
# 3. Run Ansible playbooks to deploy to EC2 instances
# 4. Smoke-tests health endpoints
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY — IAM credentials
#   AWS_SESSION_TOKEN         — Temporary session token (required for DCE)
#   AWS_REGION                — AWS region (e.g. eu-west-1)
###############################################################################
name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: "Also run terraform apply?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      ansible_tags:
        description: "Ansible tags to limit deployment (blank = all)"
        required: false
        type: string
      ansible_limit:
        description: "Ansible limit (app, observability, or blank for all)"
        required: false
        type: string

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}
  TF_WORKING_DIR: terraform

jobs:
  # ---------------------------------------------------------------------------
  #  1. Read Terraform outputs (+ optional apply)
  #     Provides dynamic IPs and ECR URLs to all downstream jobs
  # ---------------------------------------------------------------------------
  setup:
    name: Terraform Outputs
    runs-on: ubuntu-latest
    outputs:
      app_public_ip: ${{ steps.outputs.outputs.app_public_ip }}
      app_private_ip: ${{ steps.outputs.outputs.app_private_ip }}
      obs_public_ip: ${{ steps.outputs.outputs.obs_public_ip }}
      obs_private_ip: ${{ steps.outputs.outputs.obs_private_ip }}
      ecr_registry: ${{ steps.outputs.outputs.ecr_registry }}
      ecr_backend_repo: ${{ steps.outputs.outputs.ecr_backend_repo }}
      ecr_frontend_repo: ${{ steps.outputs.outputs.ecr_frontend_repo }}
      aws_region: ${{ steps.outputs.outputs.aws_region }}
      ssh_private_key: ${{ steps.outputs.outputs.ssh_private_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false    # Needed for raw output capture

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -input=false -out=tfplan
          terraform apply -input=false tfplan

      - name: Extract Terraform outputs
        id: outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          APP_IP=$(terraform output -raw app_instance_public_ip)
          APP_PRIV=$(terraform output -raw app_instance_private_ip)
          OBS_IP=$(terraform output -raw observability_instance_public_ip)
          OBS_PRIV=$(terraform output -raw observability_instance_private_ip)
          ECR_REG=$(terraform output -raw ecr_registry)
          ECR_BE=$(terraform output -raw ecr_backend_repository_url)
          ECR_FE=$(terraform output -raw ecr_frontend_repository_url)
          REGION=$(terraform output -raw aws_region)

          # Validate critical outputs are non-empty
          for var_name in APP_IP OBS_IP ECR_BE ECR_FE ECR_REG; do
            eval val=\$${var_name}
            if [[ -z "$val" ]]; then
              echo "::error::Terraform output ${var_name} is empty — infrastructure may not have been created correctly."
              exit 1
            fi
          done

          echo "app_public_ip=$APP_IP"   >> "$GITHUB_OUTPUT"
          echo "app_private_ip=$APP_PRIV" >> "$GITHUB_OUTPUT"
          echo "obs_public_ip=$OBS_IP"   >> "$GITHUB_OUTPUT"
          echo "obs_private_ip=$OBS_PRIV" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=$ECR_REG"   >> "$GITHUB_OUTPUT"
          echo "ecr_backend_repo=$ECR_BE"  >> "$GITHUB_OUTPUT"
          echo "ecr_frontend_repo=$ECR_FE" >> "$GITHUB_OUTPUT"
          echo "aws_region=$REGION"       >> "$GITHUB_OUTPUT"

          # SSH key — multiline value needs EOF delimiter
          echo 'ssh_private_key<<KEYEOF' >> "$GITHUB_OUTPUT"
          terraform output -raw ssh_private_key >> "$GITHUB_OUTPUT"
          echo 'KEYEOF' >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  #  2. Build & push Docker images to ECR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.image }}
      frontend_image: ${{ steps.meta-frontend.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ needs.setup.outputs.aws_region }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute backend image URI
        id: meta-backend
        run: |
          IMAGE="${{ needs.setup.outputs.ecr_backend_repo }}:${{ env.IMAGE_TAG }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-backend.outputs.image }}
            ${{ needs.setup.outputs.ecr_backend_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute frontend image URI
        id: meta-frontend
        run: |
          IMAGE="${{ needs.setup.outputs.ecr_frontend_repo }}:${{ env.IMAGE_TAG }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-frontend.outputs.image }}
            ${{ needs.setup.outputs.ecr_frontend_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  #  3. Deploy with Ansible
  # ---------------------------------------------------------------------------
  ansible-deploy:
    name: Ansible Deploy
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo '${{ needs.setup.outputs.ssh_private_key }}' > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

      - name: Generate Ansible inventory
        run: |
          mkdir -p ansible/inventory
          cat > ansible/inventory/hosts.ini << 'INVENTORY'
          [app]
          app-01 ansible_host=${{ needs.setup.outputs.app_public_ip }} private_ip=${{ needs.setup.outputs.app_private_ip }}

          [observability]
          obs-01 ansible_host=${{ needs.setup.outputs.obs_public_ip }} private_ip=${{ needs.setup.outputs.obs_private_ip }}

          [all:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=~/.ssh/deploy_key.pem
          ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

          # Cross-instance connectivity
          app_private_ip=${{ needs.setup.outputs.app_private_ip }}
          observability_private_ip=${{ needs.setup.outputs.obs_private_ip }}

          # ECR configuration (from Terraform outputs)
          ecr_registry=${{ needs.setup.outputs.ecr_registry }}
          ecr_backend_repo=${{ needs.setup.outputs.ecr_backend_repo }}
          ecr_frontend_repo=${{ needs.setup.outputs.ecr_frontend_repo }}
          aws_region=${{ needs.setup.outputs.aws_region }}

          # Docker images — commit-sha tagged, built this pipeline run
          app_backend_image=${{ needs.build-and-push.outputs.backend_image }}
          app_frontend_image=${{ needs.build-and-push.outputs.frontend_image }}
          INVENTORY

      - name: Wait for instances
        run: |
          for HOST in "${{ needs.setup.outputs.app_public_ip }}" "${{ needs.setup.outputs.obs_public_ip }}"; do
            echo "Waiting for $HOST..."
            for i in $(seq 1 30); do
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                     -o BatchMode=yes -i ~/.ssh/deploy_key.pem \
                     ubuntu@"$HOST" "echo ready" &>/dev/null; then
                echo "$HOST is reachable."
                break
              fi
              sleep 10
            done
          done

      - name: Run Ansible playbook
        working-directory: ansible
        run: |
          ANSIBLE_CMD="ansible-playbook -i inventory/hosts.ini site.yml"

          TAGS="${{ github.event.inputs.ansible_tags }}"
          LIMIT="${{ github.event.inputs.ansible_limit }}"

          if [[ -n "$TAGS" ]]; then
            ANSIBLE_CMD="$ANSIBLE_CMD --tags $TAGS"
          fi

          if [[ -n "$LIMIT" ]]; then
            ANSIBLE_CMD="$ANSIBLE_CMD --limit $LIMIT"
          fi

          echo "Running: $ANSIBLE_CMD"
          $ANSIBLE_CMD

  # ---------------------------------------------------------------------------
  #  4. Smoke-test health endpoints
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [setup, ansible-deploy]
    if: always() && needs.ansible-deploy.result == 'success'

    steps:
      - name: Wait for services to stabilise
        run: sleep 20

      - name: Check health endpoints
        env:
          APP_IP: ${{ needs.setup.outputs.app_public_ip }}
          OBS_IP: ${{ needs.setup.outputs.obs_public_ip }}
        run: |
          FAILED=0
          check() {
            local url="$1" name="$2"
            if curl -sf --max-time 15 "$url" > /dev/null; then
              echo "✓ $name"
            else
              echo "✗ $name — not ready"
              FAILED=$((FAILED + 1))
            fi
          }

          check "http://$APP_IP:3000/health"      "Frontend"
          check "http://$APP_IP:3001/health"       "Backend"
          check "http://$APP_IP:9100/metrics"      "Node Exporter (app)"
          check "http://$APP_IP:9121/metrics"      "Redis Exporter"
          check "http://$OBS_IP:9090/-/healthy"    "Prometheus"
          check "http://$OBS_IP:3000/api/health"   "Grafana"
          check "http://$OBS_IP:16686/"            "Jaeger"
          check "http://$OBS_IP:9100/metrics"      "Node Exporter (obs)"

          if [[ $FAILED -gt 0 ]]; then
            echo "WARNING: $FAILED service(s) not yet healthy"
          fi
