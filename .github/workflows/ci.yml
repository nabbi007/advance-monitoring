###############################################################################
# ci.yml — Continuous Integration
#
# Triggered on every pull request and push to non-main branches.
# Validates code quality and ensures Docker images build cleanly.
###############################################################################
name: CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches-ignore: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  #  Lint & dependency audit
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [backend, frontend]

    defaults:
      run:
        working-directory: app/${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/${{ matrix.app }}/package.json

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

  # ---------------------------------------------------------------------------
  #  Build Docker images (no push — just validate they compile)
  # ---------------------------------------------------------------------------
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: false
          tags: voting-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: false
          tags: voting-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  #  Validate Terraform configuration (no apply)
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init 
        run: terraform init 

      - name: Terraform Validate
        run: terraform validate

  # ---------------------------------------------------------------------------
  #  Validate Prometheus config & alert rules
  # ---------------------------------------------------------------------------
  validate-prometheus:
    name: Validate Prometheus Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull promtool
        run: |
          docker pull --quiet prom/prometheus:latest
          docker create --name prom prom/prometheus:latest
          docker cp prom:/bin/promtool /usr/local/bin/promtool
          docker rm prom

      - name: Check prometheus.yml syntax
        run: promtool check config monitoring/prometheus/prometheus.yml || true

      - name: Check alert_rules.yml syntax
        run: promtool check rules monitoring/prometheus/alert_rules.yml
  # ---------------------------------------------------------------------------
  #  Lint Ansible playbooks and roles
  # ---------------------------------------------------------------------------
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible & ansible-lint
        run: pip install ansible ansible-lint

      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint site.yml || true

      - name: Validate playbook syntax
        working-directory: ansible
        run: ansible-playbook --syntax-check -i inventory/hosts.ini site.yml