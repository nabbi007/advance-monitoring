###############################################################################
# hosts.ini — Ansible Inventory
#
# After `terraform apply`, update these IPs from terraform output.
# Or use the deploy.sh script which auto-generates this file.
###############################################################################

[app]
# <APP_PUBLIC_IP> ansible_user=ubuntu

[observability]
# <OBSERVABILITY_PUBLIC_IP> ansible_user=ubuntu

# -----------------------------------------------------------------------
#  Group variables — cross-instance wiring
# -----------------------------------------------------------------------
[app:vars]
# Private IP of the observability instance (for OTLP trace export)
observability_private_ip=

[observability:vars]
# Private IP of the app instance (for Prometheus scraping)
app_private_ip=
