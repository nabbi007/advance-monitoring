---
###############################################################################
# roles/prometheus/tasks/main.yml — Install Prometheus as a systemd service
###############################################################################

- name: Check if prometheus is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/prometheus
  register: prometheus_binary

- name: Get installed prometheus version
  ansible.builtin.command: /usr/local/bin/prometheus --version
  register: prometheus_installed_version
  changed_when: false
  failed_when: false
  when: prometheus_binary.stat.exists

- name: Set prometheus download vars
  ansible.builtin.set_fact:
    prometheus_archive: "prometheus-{{ prometheus_version }}.linux-amd64"
    prometheus_url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"

- name: Download prometheus
  ansible.builtin.get_url:
    url: "{{ prometheus_url }}"
    dest: "/tmp/prometheus.tar.gz"
    mode: "0644"
    timeout: 120
  retries: 3
  delay: 10
  when: >
    not prometheus_binary.stat.exists or
    (prometheus_installed_version.stdout is defined and
     prometheus_version not in (prometheus_installed_version.stdout | default('')))

- name: Extract prometheus
  ansible.builtin.unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: true
  when: >
    not prometheus_binary.stat.exists or
    (prometheus_installed_version.stdout is defined and
     prometheus_version not in (prometheus_installed_version.stdout | default('')))

- name: Install prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/{{ prometheus_archive }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  loop:
    - prometheus
    - promtool
  notify: Restart prometheus

- name: Create prometheus system user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Deploy prometheus.yml configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: "0644"
    validate: "/usr/local/bin/promtool check config %s"
  notify: Reload prometheus

- name: Deploy alert_rules.yml
  ansible.builtin.template:
    src: alert_rules.yml.j2
    dest: /etc/prometheus/alert_rules.yml
    owner: prometheus
    group: prometheus
    mode: "0644"
    validate: "/usr/local/bin/promtool check rules %s"
  notify: Reload prometheus

- name: Deploy prometheus systemd unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart prometheus

- name: Enable and start prometheus
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
    daemon_reload: true

- name: Verify prometheus is responding
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_listen_port }}/-/healthy"
    return_content: false
    status_code: 200
  retries: 10
  delay: 3
  register: prometheus_health
  until: prometheus_health.status == 200

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/prometheus.tar.gz
    - "/tmp/{{ prometheus_archive }}"
