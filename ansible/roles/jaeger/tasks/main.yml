---
# tasks/main.yml — Jaeger distributed tracing deployment
#
# Deploys Jaeger all-in-one via Docker Compose on the
# observability instance. Docker is already installed
# by the common role.

- name: Create Jaeger project directory
  ansible.builtin.file:
    path: /opt/jaeger
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Jaeger docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/jaeger/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart jaeger

- name: Pull Jaeger image
  ansible.builtin.command:
    cmd: docker pull {{ jaeger_image }}:{{ jaeger_version }}
  register: _jaeger_pull
  changed_when: "'Downloaded newer' in _jaeger_pull.stdout or 'Pull complete' in _jaeger_pull.stdout"
  retries: 3
  delay: 10

- name: Start Jaeger with Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /opt/jaeger
  register: _jaeger_compose
  changed_when: "'Started' in _jaeger_compose.stderr or 'Creating' in _jaeger_compose.stderr"

- name: Wait for Jaeger UI to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ jaeger_ui_port }}/"
    method: GET
    status_code: 200
  register: _jaeger_health
  until: _jaeger_health.status == 200
  retries: 30
  delay: 5
