---
###############################################################################
# roles/node_exporter/tasks/main.yml — Install node_exporter as systemd service
###############################################################################

- name: Check if node_exporter is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_binary

- name: Get installed node_exporter version
  ansible.builtin.command: /usr/local/bin/node_exporter --version
  register: node_exporter_installed_version
  changed_when: false
  failed_when: false
  when: node_exporter_binary.stat.exists

- name: Set node_exporter download vars
  ansible.builtin.set_fact:
    node_exporter_archive: "node_exporter-{{ node_exporter_version }}.linux-amd64"
    node_exporter_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"

- name: Download node_exporter
  ansible.builtin.get_url:
    url: "{{ node_exporter_url }}"
    dest: "/tmp/node_exporter.tar.gz"
    mode: "0644"
    timeout: 60
  retries: 3
  delay: 5
  when: >
    not node_exporter_binary.stat.exists or
    (node_exporter_installed_version.stdout is defined and
     node_exporter_version not in (node_exporter_installed_version.stdout | default('')))

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: true
  when: >
    not node_exporter_binary.stat.exists or
    (node_exporter_installed_version.stdout is defined and
     node_exporter_version not in (node_exporter_installed_version.stdout | default('')))

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/{{ node_exporter_archive }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart node_exporter
  when: >
    not node_exporter_binary.stat.exists or
    (node_exporter_installed_version.stdout is defined and
     node_exporter_version not in (node_exporter_installed_version.stdout | default('')))

- name: Create node_exporter system user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Deploy node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true

- name: Verify node_exporter is responding
  ansible.builtin.uri:
    url: "http://localhost:{{ node_exporter_listen_port }}/metrics"
    return_content: false
    status_code: 200
  retries: 5
  delay: 3
  register: node_exporter_health
  until: node_exporter_health.status == 200

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/node_exporter.tar.gz
    - "/tmp/{{ node_exporter_archive }}"
