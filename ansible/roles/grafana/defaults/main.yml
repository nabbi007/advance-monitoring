---
# defaults/main.yml — Grafana role defaults

grafana_version: "10.4.2"
grafana_listen_port: 3000
grafana_admin_user: "admin"
grafana_admin_password: "admin"
grafana_domain: "localhost"

# Datasource endpoints (local to observability instance)
grafana_prometheus_url: "http://localhost:9090"
grafana_jaeger_url: "http://localhost:16686"

# Provisioning paths
grafana_provisioning_path: "/etc/grafana/provisioning"
grafana_dashboards_dir: "{{ grafana_provisioning_path }}/dashboards"
grafana_datasources_dir: "{{ grafana_provisioning_path }}/datasources"
