---
###############################################################################
# roles/redis_exporter/tasks/main.yml — Install redis_exporter as systemd svc
###############################################################################

- name: Check if redis_exporter is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/redis_exporter
  register: redis_exporter_binary

- name: Get installed redis_exporter version
  ansible.builtin.command: /usr/local/bin/redis_exporter --version
  register: redis_exporter_installed_version
  changed_when: false
  failed_when: false
  when: redis_exporter_binary.stat.exists

- name: Set redis_exporter download vars
  ansible.builtin.set_fact:
    redis_exporter_archive: "redis_exporter-v{{ redis_exporter_version }}.linux-amd64"
    redis_exporter_url: "https://github.com/oliver006/redis_exporter/releases/download/v{{ redis_exporter_version }}/redis_exporter-v{{ redis_exporter_version }}.linux-amd64.tar.gz"

- name: Download redis_exporter
  ansible.builtin.get_url:
    url: "{{ redis_exporter_url }}"
    dest: "/tmp/redis_exporter.tar.gz"
    mode: "0644"
    timeout: 60
  retries: 3
  delay: 5
  when: >
    not redis_exporter_binary.stat.exists or
    (redis_exporter_installed_version.stdout is defined and
     redis_exporter_version not in (redis_exporter_installed_version.stdout | default('')))

- name: Extract redis_exporter
  ansible.builtin.unarchive:
    src: /tmp/redis_exporter.tar.gz
    dest: /tmp/
    remote_src: true
  when: >
    not redis_exporter_binary.stat.exists or
    (redis_exporter_installed_version.stdout is defined and
     redis_exporter_version not in (redis_exporter_installed_version.stdout | default('')))

- name: Install redis_exporter binary
  ansible.builtin.copy:
    src: "/tmp/{{ redis_exporter_archive }}/redis_exporter"
    dest: /usr/local/bin/redis_exporter
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart redis_exporter

- name: Create redis_exporter system user
  ansible.builtin.user:
    name: redis_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Deploy redis_exporter systemd unit
  ansible.builtin.template:
    src: redis_exporter.service.j2
    dest: /etc/systemd/system/redis_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart redis_exporter

- name: Enable and start redis_exporter
  ansible.builtin.systemd:
    name: redis_exporter
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Redis to be available before verifying exporter
  ansible.builtin.wait_for:
    port: 6379
    host: localhost
    timeout: 60
  ignore_errors: true

- name: Verify redis_exporter is responding
  ansible.builtin.uri:
    url: "http://localhost:{{ redis_exporter_listen_port }}/metrics"
    return_content: false
    status_code: 200
  retries: 5
  delay: 5
  register: redis_exporter_health
  until: redis_exporter_health.status == 200
  ignore_errors: true  # Redis may not be up yet during initial provisioning

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/redis_exporter.tar.gz
    - "/tmp/{{ redis_exporter_archive }}"
