<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Poll</title>
  <style>
    :root {
      --bg-top: #f4efe6;
      --bg-bottom: #dce8ee;
      --panel: #ffffff;
      --panel-soft: #f7fbff;
      --text: #1f2a33;
      --muted: #61717f;
      --border: #d6e0e7;
      --accent: #0f7a8a;
      --accent-strong: #0a5e6e;
      --warning: #bf360c;
      --danger: #b71c1c;
      --ok: #156d2f;
      --shadow: 0 20px 45px rgba(17, 45, 64, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 10%, #fff7e8 0%, transparent 40%),
                  radial-gradient(circle at 90% 20%, #d9f0f2 0%, transparent 38%),
                  linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      grid-template-columns: 330px 1fr;
      animation: fadeIn 350ms ease-out;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h1 {
      font-size: 1.5rem;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 14px;
    }

    form {
      display: grid;
      gap: 10px;
    }

    label {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 11px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(120deg, var(--accent), #2f9fb1);
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(120deg, var(--accent-strong), #237a8a);
    }

    .btn-soft {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-danger {
      background: #fff3f2;
      border: 1px solid #ffc7c1;
      color: var(--danger);
    }

    .list {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
      padding-right: 2px;
    }

    .poll-item {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .poll-item:hover {
      border-color: #aac8cf;
      transform: translateY(-1px);
    }

    .poll-item.active {
      border-color: var(--accent);
      background: #f3fbfd;
    }

    .poll-q {
      font-size: 0.94rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .poll-meta {
      color: var(--muted);
      font-size: 0.79rem;
    }

    .right-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .badge {
      font-size: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--muted);
      background: #fff;
      white-space: nowrap;
    }

    .badge.closed {
      color: var(--warning);
      border-color: #f2c1a6;
      background: #fff6f0;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .option {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .option-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.92rem;
      margin-bottom: 8px;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: #ecf2f6;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(120deg, #53aab8, #0f7a8a);
      transition: width 0.25s ease;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .status {
      min-height: 22px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--border);
      padding: 16px;
      border-radius: 10px;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <h1>Quick Poll</h1>
      <p class="hint">Create a poll in seconds. Poll reads are cached for faster refresh.</p>

      <form id="createPollForm">
        <div>
          <label for="question">Question</label>
          <input id="question" name="question" maxlength="180" placeholder="What should we ship first?" required />
        </div>

        <div>
          <label for="options">Options (comma or new line separated)</label>
          <textarea id="options" name="options" placeholder="Dark mode\nExport CSV\nBulk edit" required></textarea>
        </div>

        <button class="btn btn-primary" type="submit">Create Poll</button>
      </form>

      <div class="list" id="pollList"></div>
    </section>

    <section class="panel">
      <div id="pollDetail"></div>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script>
    const state = {
      polls: [],
      activePollId: null,
    };

    const pollListEl = document.getElementById("pollList");
    const pollDetailEl = document.getElementById("pollDetail");
    const statusEl = document.getElementById("status");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function parseOptions(text) {
      return text
        .split(/\n|,/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function showStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
      if (!message) return;
      window.clearTimeout(showStatus.timeout);
      showStatus.timeout = window.setTimeout(() => {
        statusEl.textContent = "";
        statusEl.className = "status";
      }, 3500);
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString();
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || "Request failed");
      }
      return payload;
    }

    function renderPollList() {
      if (!state.polls.length) {
        pollListEl.innerHTML = '<div class="empty">No polls yet.</div>';
        return;
      }

      pollListEl.innerHTML = state.polls.map((poll) => {
        const active = poll.id === state.activePollId ? "active" : "";
        return `
          <button class="poll-item ${active}" onclick="setActivePoll('${poll.id}')">
            <div class="poll-q">${escapeHtml(poll.question)}</div>
            <div class="poll-meta">${poll.totalVotes} votes • ${poll.closed ? "Closed" : "Open"}</div>
          </button>
        `;
      }).join("");
    }

    function renderPollDetails(poll) {
      if (!poll) {
        pollDetailEl.innerHTML = '<div class="empty">Pick a poll from the left, or create one.</div>';
        return;
      }

      const optionHtml = poll.options.map((option) => {
        const pct = poll.totalVotes > 0 ? ((option.votes / poll.totalVotes) * 100).toFixed(1) : "0.0";
        const disabled = poll.closed ? "disabled" : "";
        return `
          <div class="option">
            <div class="option-head">
              <strong>${escapeHtml(option.text)}</strong>
              <span>${option.votes} votes (${pct}%)</span>
            </div>
            <div class="bar"><span style="width:${pct}%"></span></div>
            <button class="btn btn-soft" ${disabled} onclick="vote('${poll.id}', '${option.id}')">Vote</button>
          </div>
        `;
      }).join("");

      pollDetailEl.innerHTML = `
        <div class="right-head">
          <div>
            <h2>${escapeHtml(poll.question)}</h2>
            <p class="hint">Created ${escapeHtml(formatDate(poll.createdAt))} • ${poll.totalVotes} total votes</p>
          </div>
          <span class="badge ${poll.closed ? "closed" : ""}">${poll.closed ? "Closed" : "Open"}</span>
        </div>

        <div class="options">${optionHtml}</div>

        <div class="actions">
          <button class="btn btn-soft" onclick="refreshActivePoll()">Refresh</button>
          <button class="btn btn-soft" onclick="toggleClosed('${poll.id}', ${!poll.closed})">${poll.closed ? "Reopen" : "Close"} Poll</button>
          <button class="btn btn-soft" onclick="resetPoll('${poll.id}')">Reset Votes</button>
          <button class="btn btn-danger" onclick="deletePoll('${poll.id}')">Delete Poll</button>
        </div>
      `;
    }

    async function loadPolls() {
      const data = await api("/api/polls");
      state.polls = data.polls || [];

      if (state.activePollId && !state.polls.find((poll) => poll.id === state.activePollId)) {
        state.activePollId = null;
      }

      if (!state.activePollId && state.polls[0]) {
        state.activePollId = state.polls[0].id;
      }

      renderPollList();
      await refreshActivePoll(false);
    }

    async function refreshActivePoll(showOkMessage = false) {
      if (!state.activePollId) {
        renderPollDetails(null);
        return;
      }

      const data = await api(`/api/polls/${state.activePollId}`);
      const poll = data.poll;
      state.polls = state.polls.map((item) => (item.id === poll.id ? poll : item));
      renderPollList();
      renderPollDetails(poll);

      if (showOkMessage) {
        showStatus("Poll refreshed", "ok");
      }
    }

    async function setActivePoll(pollId) {
      state.activePollId = pollId;
      renderPollList();
      try {
        await refreshActivePoll();
      } catch (err) {
        showStatus(err.message, "error");
      }
    }

    async function vote(pollId, optionId) {
      try {
        await api(`/api/polls/${pollId}/vote`, {
          method: "POST",
          body: JSON.stringify({ optionId }),
        });
        await refreshActivePoll();
        showStatus("Vote recorded", "ok");
      } catch (err) {
        showStatus(err.message, "error");
      }
    }

    async function toggleClosed(pollId, closed) {
      try {
        await api(`/api/polls/${pollId}/close`, {
          method: "PATCH",
          body: JSON.stringify({ closed }),
        });
        await refreshActivePoll();
        showStatus(closed ? "Poll closed" : "Poll reopened", "ok");
      } catch (err) {
        showStatus(err.message, "error");
      }
    }

    async function resetPoll(pollId) {
      try {
        await api(`/api/polls/${pollId}/reset`, { method: "POST" });
        await refreshActivePoll();
        showStatus("Votes reset", "ok");
      } catch (err) {
        showStatus(err.message, "error");
      }
    }

    async function deletePoll(pollId) {
      const ok = window.confirm("Delete this poll?");
      if (!ok) return;

      try {
        await api(`/api/polls/${pollId}`, { method: "DELETE" });
        showStatus("Poll deleted", "ok");
        await loadPolls();
      } catch (err) {
        showStatus(err.message, "error");
      }
    }

    document.getElementById("createPollForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const question = document.getElementById("question").value.trim();
      const options = parseOptions(document.getElementById("options").value);

      if (!question || options.length < 2) {
        showStatus("Enter a question and at least 2 options", "error");
        return;
      }

      try {
        const data = await api("/api/polls", {
          method: "POST",
          body: JSON.stringify({ question, options }),
        });

        document.getElementById("createPollForm").reset();
        showStatus("Poll created", "ok");
        state.activePollId = data.poll.id;
        await loadPolls();
      } catch (err) {
        showStatus(err.message, "error");
      }
    });

    async function init() {
      try {
        await loadPolls();
      } catch (err) {
        showStatus(err.message || "Failed to load polls", "error");
        renderPollDetails(null);
      }
    }

    window.setInterval(async () => {
      try {
        await loadPolls();
      } catch (_err) {
        // Keep UI responsive even if polling fails briefly.
      }
    }, 10000);

    init();
  </script>
</body>
</html>
