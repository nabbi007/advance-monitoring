<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 500px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.6);
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .vote-buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }
    .vote-btn {
      flex: 1;
      padding: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    .vote-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: #3a7bd5;
      transform: translateY(-2px);
    }
    .vote-btn:active { transform: translateY(0); }
    .vote-btn .emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
    .vote-btn .count {
      display: block;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
    }
    .results {
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .results h3 { margin-bottom: 15px; font-size: 1rem; color: rgba(255,255,255,0.7); }
    .bar-container { margin-bottom: 12px; }
    .bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 0.9rem;
    }
    .bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .bar-fill.option-0 { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
    .bar-fill.option-1 { background: linear-gradient(90deg, #f857a6, #ff5858); }
    .total {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-top: 10px;
    }
    .actions {
      display: flex;
      gap: 10px;
    }
    .action-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .status {
      text-align: center;
      margin-top: 15px;
      font-size: 0.8rem;
      min-height: 20px;
    }
    .status.success { color: #4caf50; }
    .status.error { color: #ff5858; }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#9745; Vote Now</h1>
    <p class="subtitle">Choose your favorite — powered by OpenTelemetry observability</p>

    <div class="vote-buttons" id="voteButtons"></div>

    <div class="results" id="results">
      <h3>Live Results</h3>
      <div id="bars"></div>
      <div class="total" id="total"></div>
    </div>

    <div class="actions">
      <button class="action-btn" onclick="resetVotes()">Reset Votes</button>
      <button class="action-btn" onclick="loadResults()">Refresh</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const EMOJIS = { cats: "🐱", dogs: "🐶", python: "🐍", javascript: "🟨", rust: "🦀" };
    let options = [];

    async function init() {
      try {
        const res = await fetch("/api/votes");
        const data = await res.json();
        options = data.options || Object.keys(data.votes);
        renderButtons(data.votes);
        renderBars(data.votes);
      } catch (err) {
        showStatus("Failed to load votes", "error");
      }
    }

    function renderButtons(votes) {
      const container = document.getElementById("voteButtons");
      container.innerHTML = options.map((opt) => `
        <button class="vote-btn" onclick="castVote('${opt}')">
          <span class="emoji">${EMOJIS[opt] || "🗳️"}</span>
          ${opt.charAt(0).toUpperCase() + opt.slice(1)}
          <span class="count" id="count-${opt}">${votes[opt] || 0} votes</span>
        </button>
      `).join("");
    }

    function renderBars(votes) {
      const total = Object.values(votes).reduce((a, b) => a + b, 0);
      const barsEl = document.getElementById("bars");
      barsEl.innerHTML = options.map((opt, i) => {
        const count = votes[opt] || 0;
        const pct = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
        return `
          <div class="bar-container">
            <div class="bar-label">
              <span>${opt.charAt(0).toUpperCase() + opt.slice(1)}</span>
              <span>${count} (${pct}%)</span>
            </div>
            <div class="bar">
              <div class="bar-fill option-${i}" style="width: ${pct}%"></div>
            </div>
          </div>`;
      }).join("");
      document.getElementById("total").textContent = `Total votes: ${total}`;
    }

    async function castVote(option) {
      try {
        const res = await fetch("/api/vote", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ option }),
        });
        if (!res.ok) throw new Error("Vote failed");
        showStatus(`Voted for ${option}!`, "success");
        await loadResults();
      } catch (err) {
        showStatus("Failed to cast vote", "error");
      }
    }

    async function loadResults() {
      try {
        const res = await fetch("/api/results");
        const data = await res.json();
        renderButtons(data.votes);
        renderBars(data.votes);
      } catch (err) {
        showStatus("Failed to load results", "error");
      }
    }

    async function resetVotes() {
      try {
        await fetch("/api/reset", { method: "POST" });
        showStatus("Votes reset!", "success");
        await loadResults();
      } catch (err) {
        showStatus("Failed to reset", "error");
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = `status ${type}`;
      setTimeout(() => { el.textContent = ""; el.className = "status"; }, 3000);
    }

    init();
    setInterval(loadResults, 5000);
  </script>
</body>
</html>
